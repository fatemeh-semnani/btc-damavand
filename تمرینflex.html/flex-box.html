<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./flex-box.css">
</head>
<body>

    <div class="container">

       <div class="div-1">
        <p class="blue-box"></p>
        <p class="blue-box"></p>
        <p class="blue-box"></p>
        <p class="brown-box"></p>
       </div>
            
       <div class="div-1">
        <p class="brown-box"></p>
        <p class="blue-box" style="background-color: #cdeb8b; border: none;"></p>
        <p class="blue-box"></p>
        <p class="blue-box"></p>
       </div>

       <div class="div-1" style="justify-content: space-between;">
        <p class="brown-box"></p>
        <p class="brown-box"></p>
       </div>
      
       <div class="div-1">
        <p class="blue-box" style="background-color: #cdeb8b; border: 1px solid transparent;"></p>
        <p class="blue-box"></p>
        <p class="blue-box"></p>

        <p class="blue-box" style="background-color: #cdeb8b; border: none; width: 22px;"></p>
        <p class="blue-box"></p>
        <p class="blue-box"></p>
       </div>

       <div class="div-1">
        <p class="blue-box"></p>
        <p class="blue-box"></p>
        <p class="blue-box"></p>
        <p class="blue-box"></p>
       </div>

       <div class="div-1">
        <p class="blue-box" style="background-color: #cdeb8b; border: 1px solid transparent;"></p>
        <p class="blue-box" style="background-color: #cdeb8b; border: 1px solid transparent;"></p>
        <p class="blue-box"></p>

        <p class="blue-box" style="background-color: #cdeb8b; border: none; width: 24px;"></p>
        <p class="blue-box"></p>
       </div>

       <div class="div-1" style="justify-content: space-between;">
        <p class="blue-box"></p>
        <p class="brown-box"></p>
        <p class="blue-box"></p>
       </div>

    </div>

</body>
</html>
